
services:
  postgres:
    image: postgres:17
    container_name: pulse-postgres
    environment:
      POSTGRES_DB: pulse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pulse_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pulse_pgdata: